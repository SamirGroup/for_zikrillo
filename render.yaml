# Render.com Deployment Configuration
version: 1

# ─── PostgreSQL Database ──────────────────────────────────────────────────────
databases:
  - name: vfs-db
    databaseName: vfsdb
    user: vfsuser
    plan: starter  # Free tier
    postgresMajorVersion: 16
    disk:
      name: vfs-db-disk
      size: 1GB

# ─── Redis Instance ───────────────────────────────────────────────────────────
services:
  - type: redis
    name: vfs-redis
    plan: starter  # Free tier
    ipAllowList: []  # Allow all (only accessible internally)

# ─── Backend Web Service ──────────────────────────────────────────────────────
  - type: web
    name: vfs-backend
    env: node
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && npx prisma migrate deploy && npm start
    plan: starter  # Free tier
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: vfs-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vfs-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: PROFILE_ENCRYPTION_KEY
        generateValue: true
      - key: CAPTCHA_SOLVER
        value: manual
      - key: BOOKING_CONCURRENCY
        value: "3"
      - key: MONITOR_DEFAULT_INTERVAL_MS
        value: "30000"
      - key: SESSION_DIR
        value: /tmp/sessions
      - key: BOOKING_MAX_RETRIES
        value: "3"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: vfs-frontend
          property: url
      # Telegram (optional - set manually after deployment)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

# ─── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: vfs-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/out
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: vfs-backend
          property: url
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          type: web
          name: vfs-backend
          property: url
    # Static site configuration
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
